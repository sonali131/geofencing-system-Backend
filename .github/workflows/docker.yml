name: Build and Push Docker
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
        
      - name: Build and Push
        run: |
          # Yahan ./backend ki jagah sirf . (dot) aayega
          docker build -t ${{ secrets.DOCKER_USERNAME }}/geofence-backend:latest .
          docker push ${{ secrets.DOCKER_USERNAME }}/geofence-backend:latest